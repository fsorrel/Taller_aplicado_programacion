server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:ecoconce;MODE=Oracle;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  frontend-url: http://localhost:5500
